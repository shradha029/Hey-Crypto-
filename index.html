<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Price Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Floating background coins -->
<div class="coin coin1">₿</div>
<div class="coin coin2">Ξ</div>
<div class="coin coin3">Ð</div>
<div class="coin coin4">◎</div>

<div class="container">
  <h1>Crypto Price Tracker</h1>

  <div class="meta-row">
    <span id="last-updated" class="last-updated">Fetching prices...</span>
    <span class="live-badge"><span class="live-dot"></span>Live</span>
  </div>

  <!-- Bitcoin -->
  <div class="crypto-card">
    <div class="card-left">
      <div class="coin-icon btc-icon">₿</div>
      <div class="coin-info">
        <h2>Bitcoin</h2>
        <span class="coin-symbol">BTC</span>
      </div>
    </div>
    <div class="card-right">
      <p class="price" id="bitcoin-price">Loading...</p>
      <span class="change neutral" id="bitcoin-change">—</span>
    </div>
  </div>

  <!-- Ethereum -->
  <div class="crypto-card">
    <div class="card-left">
      <div class="coin-icon eth-icon">Ξ</div>
      <div class="coin-info">
        <h2>Ethereum</h2>
        <span class="coin-symbol">ETH</span>
      </div>
    </div>
    <div class="card-right">
      <p class="price" id="ethereum-price">Loading...</p>
      <span class="change neutral" id="ethereum-change">—</span>
    </div>
  </div>

  <!-- Dogecoin -->
  <div class="crypto-card">
    <div class="card-left">
      <div class="coin-icon doge-icon">Ð</div>
      <div class="coin-info">
        <h2>Dogecoin</h2>
        <span class="coin-symbol">DOGE</span>
      </div>
    </div>
    <div class="card-right">
      <p class="price" id="dogecoin-price">Loading...</p>
      <span class="change neutral" id="dogecoin-change">—</span>
    </div>
  </div>

  <!-- Solana -->
  <div class="crypto-card">
    <div class="card-left">
      <div class="coin-icon sol-icon">◎</div>
      <div class="coin-info">
        <h2>Solana</h2>
        <span class="coin-symbol">SOL</span>
      </div>
    </div>
    <div class="card-right">
      <p class="price" id="solana-price">Loading...</p>
      <span class="change neutral" id="solana-change">—</span>
    </div>
  </div>

  <button onclick="getCryptoPrices()">↻ Refresh Prices</button>
</div>

<script src="script.js"></script>
</body>
</html>
